<!DOCTYPE html>

<head>

  <title>DSA Arsenal — 3D Pattern Visualiser</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<body>
  <div class="app-shell">
    <!-- ===== Top bar ===== -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span class="brand-dot"></span>
        </div>
        <div class="brand-text">
          <h1>DSA&nbsp;Arsenal</h1>
          <p>3D Pattern Visualiser · Deep&nbsp;Rust&nbsp;/&nbsp;Pearl</p>
        </div>
      </div>

      <div class="topbar-right">
        <div class="progress-pill" id="progressPill">
          <span class="progress-count" id="progressCount">58</span>
          <span class="progress-total">/ 58 built</span>
        </div>
        <button class="ghost-btn" id="menuToggle" aria-label="Toggle menu">☰</button>
      </div>
    </header>

    <div class="layout">
      <!-- ===== Sidebar ===== -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-search">
          <input type="text" id="searchInput" placeholder="Search patterns or problems…" autocomplete="off" />
        </div>
        <nav class="pattern-nav" id="patternNav"><!-- injected --></nav>
        <div class="sidebar-footer">
          <span>All 12 patterns · 58 simulations live</span>
        </div>
      </aside>

      <!-- ===== Main content ===== -->
      <main class="content" id="content"><!-- injected --></main>
    </div>
  </div>
